version: '3.8'

services:
  mcp:
    # Use the pre-built image from Docker Hub or build locally using the Dockerfile. For now I kept it commented out to avoid confusion and clutter, but you can uncomment it to use the image directly.
    # image: geekflarehq/geekflare-api-mcp:latest
    build:
      context: .
      dockerfile: Dockerfile

    container_name: geekflare-mcp

    restart: always

    environment:
      MCP_TRANSPORT: http
      API_BASE_URL: ${API_BASE_URL:-https://api.geekflare.com}
      PORT: ${PORT:-5000}

    ports:
      - '${PORT:-5000}:${PORT:-5000}'
